{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Login</h3>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                {% if request.GET.next and 'review' in request.GET.next %}
                <div class="alert" style="background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.4);color:var(--brown-dark);font-size:0.85rem;">
                    <i class="fas fa-info-circle" style="color:var(--gold);margin-right:6px;"></i>
                    You need to be signed in to leave a review.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>

                <p class="text-center mt-3">
                    Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
